# troy.toml -- a 3270 green screen inspired theme for Helix
#
# Goals of the theme:
# 
# 1. Visual clarity-I have trouble with the contrast and color selections
#    of most themes (old age, myopia).
# 2. Reduced use of color-Some color is good, but a separate color for every
#    type of language element and UI widget is noise and not meaningful to
#    me.
# 3. Retro feel-My career began in the age of monochrome (green, white, or
#    amber).
#    
# Sources:
# 
# vegetative theme     https://github.com/emacsfodder/emacs-theme-vegetative
# theme template       https://github.com/joegm/helix-theme-template.git
# helix documentation  https://docs.helix-editor.com/themes.html
#                      https://helix-editor.vercel.app/reference/custom-themes
#
# The vegetative theme is a green screen theme that provides a good color
# palette. The them template provides a list themeable elements. Both are
# very helpful.
#
# The original vegetative theme is offered under the GNU/GPL license. The helix
# theme template has no license listed. This theme is...
#
# Copyright (c) 2025 by Troy Brumley.
#
# My work is available under a your choice license--public domain under the
# unlicense or the MIT license. 

"warning" = { fg = "yellow" } # Editor warnings.
"error" = { fg = "red" } # Editor errors, like mis-typing a command.
"info" = { fg = "cyan"} # Contextual info in diagnostic messages (LSP).
"hint" = { fg = "white" } # Code diagnostics hints (LSP).
"diagnostic" = { fg = "red" } # Code diagnostics in editing area (LSP).

"diagnostic.error" = { underline = { style = "line", color = "red" } }
"diagnostic.warning" = { underline = { style = "line", color = "red" } }
"diagnostic.info" = { underline = { style = "line", color = "red" } }
"diagnostic.hint" = { underline = { style = "line", color = "red" } }
"diagnostic.label" = { fg = "red", modifiers = ["bold"] }


# ========== The main UI ===========
# For styling helix itself.
 
"ui.window" = { bg = "background-1" } # Window border between splits.
"ui.gutter" = { bg = "background-0-hard" } # Left gutter for diagnostics and breakpoints.
"ui.linenr.selected" = { bg = "light-gray" }
"ui.linenr" = "muted-green"

"ui.text" = "medium"
"ui.text.focus" = { fg = "foreground-4" } # Selection highlight in buffer-picker or file-picker.
"ui.text.info" = { fg = "foreground-1" } # Info popup contents (space mode menu).

"ui.background" = { bg = "background-0-hard" }

"ui.menu.selected" = { bg = "cyan" }

"ui.selection" = { fg = "yellow", bg="background-green"}
"ui.selection.primary" = { fg = "cyan", bg = "background-green" } # The primary selection when there are multiple.

"ui.cursor" = { bg = "muted-green", fg="black" }
# "ui.cursor.primary" = { } # The primary cursor when there are multiple (shift-c).
# "ui.cursor.insert" = { } # The cursor in insert mode (i).
# "ui.cursor.select" = { } # The cursor in select mode (v).
# "ui.cursor.match" = { } # The matching parentheses of that under the cursor.

"ui.virtual.diagnostic.error" = { fg = "red" }
"ui.virtual.diagnostic.warning" = { fg = "yellow" }
"ui.virtual.diagnostic.hint" = { fg = "cyan" }
"ui.virtual.diagnostic.info" = { fg = "white" }
"ui.lint.error" = { fg = "red" }

"ui.lint.warning" = { fg = "yellow" }
"ui.lint.info" = { fg = "cyan" }
"ui.lint.hint" = { fg = "white" }

"ui.bufferline.active" = { bg = "blue" }
"ui.bufferline.background" = { bg = "#3A4047" }
"ui.gutter.selected" = "background-green" # "#de6e5336"

"ui.virtual.ruler" = { bg = "#888888" }
"ui.virtual.jump-label" = { modifiers = ["reversed"] } # bg = "background-green", fg = "black" }
# virtual wrap doesn't seem to take, but virtual ruler shows there.
"ui.virtual.wrap" = { bg = "#888888" } # background-orange" }

# ========== What's being edited ============
"comment" = { fg = "faded-green", modifiers = [ "italic" ] }
"comment.line" = { fg = "faded-green", modifiers = [ "bold" ] }
"comment.block" = { fg = "faded-green", modifiers = [ "italic" ] }
"comment.block.documentation" = { fg = "faded-green" }
"string" = { fg = "bright-cyan" } # String literal.
"punctuation" = { fg = "bright-yellow" } # Any punctuation symbol.
"keyword" = { modifiers = [ "bold" ] } # Language reserved keywords.
"operator" = { fg = "medium" } # Logical, mathematical, and other operators.
"function" = { fg = "medium", modifiers = [ "bold" ] }
"constant" = { fg = "blue" } # Constant value
"variable" = { fg = "faded-green" } # Variable names.

