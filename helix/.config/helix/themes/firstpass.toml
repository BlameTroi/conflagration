# Version control changes.

"diff.plus"        = { fg="green" } # Additions.
"diff.minus"       = { fg="red" } # Deletions.
"diff.delta"       = { fg="blue" } # Modifications.
"diff.delta.moved" = { fg="bright-purple" } # Renamed or moved files.


# The color names from the vegetative theme were prefixed "vegetative-". But
# with the lack of namespace clutter in Helix I've dropped that prefix.
#
# There are more colors available than I need but I've kept the unused colors
# for reference.


